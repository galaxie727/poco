<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>デカブサ放置テスト</title>

<style>
body{
  margin:0;
  background:#f5f5f5;
  font-family:sans-serif;
  overflow:hidden;
}

/* セリフ */
#speech{
  position:absolute;
  top:5%;
  width:100%;
  text-align:center;
  font-size:20px;
  opacity:0.7;
}

/* キャラ共通 */
.char{
  position:absolute;
  width:80px;
  transition:transform 0.5s;
  animation:breath 6s ease-in-out infinite;
}

/* 呼吸 */
@keyframes breath{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.05);}
}

/* 配置 */
#dekabusa{left:40%; top:40%;}
#tora{left:20%; top:20%; transform:scale(0.95);}
#kabao{left:60%; top:25%; transform:scale(1.05);}
#gori{left:15%; top:65%; transform:scale(1.1);}
#panpan{left:65%; top:70%; transform:scale(1.1);}

/* 下UI */
#ui{
  position:absolute;
  bottom:10px;
  width:100%;
  text-align:center;
}

button{
  margin:5px;
  padding:10px 20px;
  border:none;
  background:#ddd;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="speech">・・・</div>

<!-- キャラ（画像は差し替え） -->
<img src="dekabusa.png" id="dekabusa" class="char">
<img src="tora.png" id="tora" class="char">
<img src="kabao.png" id="kabao" class="char">
<img src="gori.png" id="gori" class="char">
<img src="panpan.png" id="panpan" class="char">

<div id="ui">
  <button onclick="action()">なんか作る</button>
  <button onclick="action()">やめる</button>
  <button onclick="action()">様子見る</button>
</div>

<script>
const lines = [
  "腹へった",
  "今日はやめよ",
  "やってる感だけ出すか",
  "まあいいか",
  "動きたくねーなー",
  "気が向いたらね"
];

function speak(){
  const rand = lines[Math.floor(Math.random()*lines.length)];
  document.getElementById("speech").innerText = rand;
}

/* 3秒ごとに誰か喋る */
setInterval(speak,3000);

/* ボタン押した時 */
function action(){
  speak();
}
</script>

</body>
</html>
