<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>デカブサ放置クラフト</title>

<style>
*{box-sizing:border-box}

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#f4f4f4;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  color:#333;
}

#game{
  position:relative;
  width:100vw;
  height:100dvh;
  overflow:hidden;
  background:
    radial-gradient(circle at 50% 35%, #fff 0%, #f4f4f4 55%, #ececec 100%);
}

/* タイトル */
#title{
  position:absolute;
  top:calc(env(safe-area-inset-top) + 34px);
  left:0;
  width:100%;
  text-align:center;
  font-size:28px;
  color:#555;
  letter-spacing:.04em;
}

/* 資源 */
#status{
  position:absolute;
  top:calc(env(safe-area-inset-top) + 86px);
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  font-size:14px;
  color:#555;
}

.badge{
  background:rgba(255,255,255,.75);
  border:1px solid rgba(0,0,0,.08);
  border-radius:999px;
  padding:7px 12px;
}

/* キャラ */
.char{
  position:absolute;
  width:82px;
  --s:1;
  animation:breath 5.5s ease-in-out infinite;
  transform-origin:center bottom;
  user-select:none;
  -webkit-user-drag:none;
}

@keyframes breath{
  0%,100%{
    transform:scale(var(--s)) translateY(0);
  }
  50%{
    transform:scale(calc(var(--s) * 1.06)) translateY(-5px);
  }
}

/* 配置 */
#tora{left:27%; top:28%; --s:.95;}
#kabao{left:68%; top:32%; --s:1.04;}
#dekabusa{left:47%; top:47%; --s:1.08;}
#gori{left:21%; top:67%; --s:1.18;}
#panpan{left:70%; top:68%; --s:1.12;}

/* 吹き出し */
#bubble{
  position:absolute;
  max-width:170px;
  padding:8px 12px;
  background:rgba(255,255,255,.88);
  border:2px solid #555;
  border-radius:16px;
  font-size:14px;
  color:#333;
  line-height:1.4;
  text-align:center;
  transform:translate(-50%,-100%);
  opacity:0;
  transition:opacity .2s, left .25s, top .25s;
  pointer-events:none;
  z-index:10;
}

#bubble::after{
  content:"";
  position:absolute;
  left:50%;
  bottom:-9px;
  transform:translateX(-50%);
  border-left:8px solid transparent;
  border-right:8px solid transparent;
  border-top:9px solid #555;
}

/* クラフト置き場 */
#field{
  position:absolute;
  left:50%;
  bottom:150px;
  transform:translateX(-50%);
  width:78%;
  height:86px;
  border-radius:18px;
  background:rgba(255,255,255,.45);
  border:1px dashed rgba(0,0,0,.15);
  display:flex;
  justify-content:center;
  align-items:center;
  gap:14px;
}

.item{
  width:52px;
  height:52px;
  border-radius:14px;
  background:#ddd;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  opacity:.9;
}

/* 下UI */
#ui{
  position:absolute;
  left:0;
  bottom:calc(env(safe-area-inset-bottom) + 26px);
  width:100%;
  display:flex;
  justify-content:center;
  gap:12px;
  padding:0 14px;
}

button{
  border:none;
  border-radius:18px;
  padding:13px 18px;
  font-size:15px;
  color:#2680ff;
  background:#ddd;
  min-width:104px;
  -webkit-tap-highlight-color:transparent;
}

button:active{
  transform:translateY(1px);
  filter:brightness(.96);
}

/* 小さいログ */
#log{
  position:absolute;
  left:50%;
  bottom:250px;
  transform:translateX(-50%);
  font-size:13px;
  color:#777;
  opacity:.85;
  white-space:nowrap;
}

/* 浮き文字 */
.floatText{
  position:absolute;
  font-size:15px;
  color:#555;
  animation:floatUp 1s ease-out forwards;
  pointer-events:none;
  z-index:20;
}

@keyframes floatUp{
  from{
    opacity:1;
    transform:translateY(0);
  }
  to{
    opacity:0;
    transform:translateY(-28px);
  }
}
</style>
</head>

<body>
<div id="game">

  <div id="title">やってる感だけ出すか</div>

  <div id="status">
    <div class="badge">木：<span id="wood">0</span></div>
    <div class="badge">石：<span id="stone">0</span></div>
    <div class="badge">作った物：<span id="made">0</span></div>
  </div>

  <img src="tora.png" id="tora" class="char">
  <img src="kabao.png" id="kabao" class="char">
  <img src="dekabusa.png" id="dekabusa" class="char">
  <img src="gori.png" id="gori" class="char">
  <img src="panpan.png" id="panpan" class="char">

  <div id="bubble"></div>

  <div id="log">何も起きてない</div>

  <div id="field"></div>

  <div id="ui">
    <button onclick="collect()">素材拾う</button>
    <button onclick="craft()">なんか作る</button>
    <button onclick="rest()">やめる</button>
  </div>

</div>

<script>
let wood = 0;
let stone = 0;
let made = 0;

const chars = [
  {
    id:"dekabusa",
    lines:["腹へった","今日はやめよ","やってる感だけ出すか","まあいいか"]
  },
  {
    id:"tora",
    lines:["分身するほどでもない","今じゃない","見てはいる"]
  },
  {
    id:"kabao",
    lines:["深呼吸するか","水いる？","落ち着こう"]
  },
  {
    id:"gori",
    lines:["……","動かん","力はある"]
  },
  {
    id:"panpan",
    lines:["寝る","笹ある？","かわいいから許される"]
  }
];

const craftItems = ["🪑","🪵","🪨","📦","🛖","🪧"];

function updateStatus(){
  document.getElementById("wood").textContent = wood;
  document.getElementById("stone").textContent = stone;
  document.getElementById("made").textContent = made;
}

function setLog(text){
  document.getElementById("log").textContent = text;
}

function randomChar(){
  return chars[Math.floor(Math.random() * chars.length)];
}

function speak(charId, text){
  const bubble = document.getElementById("bubble");
  const el = document.getElementById(charId);

  bubble.textContent = text;

  const r = el.getBoundingClientRect();
  bubble.style.left = (r.left + r.width / 2) + "px";
  bubble.style.top = (r.top - 8) + "px";
  bubble.style.opacity = 1;

  clearTimeout(window.bubbleTimer);
  window.bubbleTimer = setTimeout(()=>{
    bubble.style.opacity = 0;
  }, 1900);
}

function autoSpeak(){
  const c = randomChar();
  const line = c.lines[Math.floor(Math.random() * c.lines.length)];
  speak(c.id, line);
}

function floatText(text, x, y){
  const f = document.createElement("div");
  f.className = "floatText";
  f.textContent = text;
  f.style.left = x + "px";
  f.style.top = y + "px";
  document.getElementById("game").appendChild(f);

  setTimeout(()=>{
    f.remove();
  }, 1000);
}

function collect(){
  const gotWood = Math.random() < .65;
  const amount = Math.random() < .18 ? 2 : 1;

  if(gotWood){
    wood += amount;
    setLog("木を拾った");
    floatText("木 +" + amount, window.innerWidth/2 - 20, window.innerHeight - 190);
  }else{
    stone += amount;
    setLog("石を拾った");
    floatText("石 +" + amount, window.innerWidth/2 - 20, window.innerHeight - 190);
  }

  updateStatus();

  const c = randomChar();
  const lines = gotWood
    ? ["木だな","拾った感ある","それ使う？"]
    : ["石だな","重そう","まあ置いとくか"];

  speak(c.id, lines[Math.floor(Math.random() * lines.length)]);
}

function craft(){
  if(wood < 2 || stone < 1){
    setLog("素材が足りない");
    speak("dekabusa","足りないならやめよ");
    return;
  }

  wood -= 2;
  stone -= 1;
  made += 1;
  updateStatus();

  const item = document.createElement("div");
  item.className = "item";
  item.textContent = craftItems[Math.floor(Math.random() * craftItems.length)];
  document.getElementById("field").appendChild(item);

  setLog("なんか作った");
  speak("dekabusa","完成したっぽい");

  if(document.querySelectorAll(".item").length > 6){
    document.querySelector(".item").remove();
  }
}

function rest(){
  const restLines = [
    ["dekabusa","今日はやめよ"],
    ["gori","……"],
    ["panpan","寝る"],
    ["tora","今じゃない"],
    ["kabao","深呼吸するか"]
  ];

  const r = restLines[Math.floor(Math.random() * restLines.length)];
  setLog("やめた");
  speak(r[0], r[1]);
}

/* 放置でたまに素材が増える */
setInterval(()=>{
  if(Math.random() < .5){
    wood++;
    setLog("気づいたら木が増えた");
  }else{
    stone++;
    setLog("気づいたら石が増えた");
  }
  updateStatus();
}, 9000);

/* 自動セリフ */
setInterval(autoSpeak, 3600);

updateStatus();
setTimeout(autoSpeak, 800);
</script>

</div>
</body>
</html>
